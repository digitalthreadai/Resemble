<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resemble — Documentation Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0F;
      --surface: #12121A;
      --surface-hover: #1E1E2E;
      --terminal-border: #2A2A3E;
      --text: #E8E8ED;
      --muted: #8888A0;
      --primary: #7c3aed;
      --primary-light: #c4b5fd;
      --secondary: #a855f7;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 4rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .hero p {
      font-size: 1.125rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
      width: 100%;
      max-width: 56rem;
    }

    @media (min-width: 768px) {
      .card-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--terminal-border);
      border-radius: 12px;
      padding: 1.75rem;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.15);
      background: var(--surface-hover);
    }

    .card-icon {
      font-size: 1.75rem;
      margin-bottom: 1rem;
      width: 2.75rem;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(124, 58, 237, 0.1);
      border-radius: 8px;
    }

    .card-title {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      letter-spacing: -0.01em;
    }

    .card-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--secondary);
      margin-bottom: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }

    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      border-top: 1px solid var(--terminal-border);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-family: 'JetBrains Mono', monospace;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: var(--primary-light);
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <h1>Resemble</h1>
      <p>AI-powered face comparison documentation</p>
    </div>

    <div class="card-grid">
      <a href="README.html" class="card">
        <div class="card-icon">&#x1F680;</div>
        <div class="card-label">README</div>
        <div class="card-title">Project Overview</div>
        <div class="card-desc">Stack, features, quick start, architecture</div>
      </a>

      <a href="COO.html" class="card">
        <div class="card-icon">&#x1F4CA;</div>
        <div class="card-label">COO</div>
        <div class="card-title">Strategy &amp; Features</div>
        <div class="card-desc">Vision, feature map, engine architecture, roadmap</div>
      </a>

      <a href="SITECONFIGURATIONS.html" class="card">
        <div class="card-icon">&#x1F527;</div>
        <div class="card-label">SITECONFIGURATIONS</div>
        <div class="card-title">Setup Guide</div>
        <div class="card-desc">Environment, build, deploy, checklist</div>
      </a>
    </div>
  </main>

  <footer>
    <a href="https://github.com/digitalthreadai" target="_blank" rel="noopener noreferrer">digitalthreadai</a>
  </footer>
</body>
</html>
